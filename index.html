<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Widget — Local Dev</title>
    <style>
      body {
        font-family: sans-serif;
        background: #f5f5f5;
        padding: 2rem;
      }
      .page-note {
        font-size: 0.85rem;
        color: #666;

        border-radius: 4px;

    <p class="page-note">

  </body>
