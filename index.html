<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Widget — Local Dev</title>
    <style>
      body {
        font-family: sans-serif;
        background: #f5f5f5;
        padding: 2rem;
      }
      .page-note {
        font-size: 0.85rem;
        color: #666;
        margin-bottom: 2rem;
        padding: 0.75rem 1rem;
        background: #fff3cd;
        border-left: 3px solid #f0ad4e;
        border-radius: 4px;
      }
      .page-note code { font-size: 0.9em; }
    </style>
  </head>
  <body>
    <p class="page-note">
      Local dev preview — the <code>data-*</code> attributes below simulate what Webflow CMS injects.
      In Webflow, these values come from bound CMS fields on the Collection Page.
    </p>

    <!--
      WEBFLOW IMPLEMENTATION:
      In Webflow, add a Custom HTML Embed element and bind each data attribute
      to a CMS field using the purple "+" binding button in the embed editor:

      <div
        id="react-root"
        data-name="[Product Name field]"
        data-description="[Short Description field]"
        data-color="[Brand Color field]"
        data-specs="[Specs JSON field]"
      ></div>
    -->
    <div
      id="react-root"
      data-name="Spruce Profile 145×22"
      data-description="Premium spruce cladding, kiln-dried and planed. Suitable for exterior and interior use."
      data-color="#1a3a5c"
      data-specs='[
        { "label": "Width",          "value": "145 mm" },
        { "label": "Thickness",      "value": "22 mm"  },
        { "label": "Length",         "value": "5000 mm"},
        { "label": "Strength class", "value": "C16"    }
      ]'
    ></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
