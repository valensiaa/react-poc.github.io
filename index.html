<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Widget — Local Dev</title>
    <style>
      body {
        font-family: sans-serif;
        background: #f5f5f5;
        padding: 2rem;
      }
      .page-note {
        font-size: 0.85rem;
        color: #666;
        margin-bottom: 2rem;
        padding: 0.75rem 1rem;
        background: #fff3cd;
        border-left: 3px solid #f0ad4e;
        border-radius: 4px;
      }
      .page-note code { font-size: 0.9em; }
    </style>
    <script type="module" crossorigin src="/react-poc.github.io/widget.js"></script>
    
  </head>
  <body>
    <p class="page-note">
      Local dev preview — the <code>data-*</code> attributes below simulate what Webflow CMS injects.
      In Webflow, these values come from bound CMS fields on the Collection Page.
    </p>

    <!--
      WEBFLOW IMPLEMENTATION:
      In Webflow, add a Custom HTML Embed element and bind each data attribute
      to a CMS field using the purple "+" binding button in the embed editor:

      <div
        id="react-root"
        data-name="[Product Name field]"
        data-description="[Short Description field]"
        data-color="[Brand Color field]"
        data-specs="[Specs JSON field]"
      ></div>
    -->
    <div
      id="react-root"
      data-name="Spruce Profile 145×22"
      data-description="Premium spruce cladding, kiln-dried and planed. Suitable for exterior and interior use."
      data-color="#1a3a5c"
      data-specs='[
        { "label": "Width",          "value": "145 mm" },
        { "label": "Thickness",      "value": "22 mm"  },
        { "label": "Length",         "value": "5000 mm"},
        { "label": "Strength class", "value": "C16"    }
      ]'
    ></div>

    <!--
      GOOGLE MAP WIDGET — WEBFLOW IMPLEMENTATION (MULTI-PIN):

      1. Place ONE map root where the map should appear:

         <div id="react-map-root" data-zoom="11"></div>

         Optional attributes on the root:
           data-zoom        — zoom level when there is only one pin (ignored with 2+ pins)
           data-fit-bounds  — set to "false" to disable auto-fit when 2+ pins exist

      2. Add a Collection List (bound to your "Company infos" collection) anywhere
         on the page. Inside the Collection Item, add a Code Embed:

         <div class="react-map-location"
              data-name="{{Name}}"
              data-email="{{Email}}"
              data-phone="{{Phone}}"
              data-address="{{Address}}"
              data-lat="{{Lat}}"
              data-lng="{{Lng}}"></div>

         The .react-map-location nodes are hidden by CSS — they only feed pin data.

      3. Add the script tag once (e.g. in the page's footer custom code):

         <script src="https://<your-gh-pages-domain>/widget.js" defer></script>
    -->
    <div style="margin-top: 2rem;">
      <!-- 1. Map root -->
      <div id="react-map-root" data-zoom="11"></div>

      <!-- 2. Pin sources (in Webflow these come from a Collection List, one per Item) -->
      <div
        class="react-map-location"
        data-name="Stradigi BV"
        data-email="info@stradigi.eu"
        data-phone="+31 (0)77 - 234 0888"
        data-address="Geldersebaan 87, 5931 JM Tegelen"
        data-lat="51.3480318"
        data-lng="6.1552843"
      ></div>
      <div
        class="react-map-location"
        data-name="Stradigi Amsterdam"
        data-email="amsterdam@stradigi.eu"
        data-phone="+31 (0)20 - 123 4567"
        data-address="Damrak 1, 1012 LG Amsterdam"
        data-lat="52.3740"
        data-lng="4.8897"
      ></div>
      <div
        class="react-map-location"
        data-name="Stradigi Rotterdam"
        data-email="rotterdam@stradigi.eu"
        data-phone="+31 (0)10 - 987 6543"
        data-address="Coolsingel 40, 3011 AD Rotterdam"
        data-lat="51.9225"
        data-lng="4.4792"
      ></div>
    </div>

  </body>
</html>
